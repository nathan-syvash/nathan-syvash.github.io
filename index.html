<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nathan Syvash Portfolio</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #1f1f1f;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
    }

    .desktop-frame {
      position: relative;
      width: 1045px;
      height: 765px;
      background: #efefef;
      overflow: hidden;
    }

    .logo {
      position: absolute;
      top: 82px;
      left: 102px;
      width: 58px;
      height: auto;
      object-fit: contain;
    }

    .nav {
      position: absolute;
      top: 94px;
      right: 120px;
      display: flex;
      align-items: center;
      gap: 42px;
      font-size: 18px;
      font-weight: 400;
    }

    .nav a {
      text-decoration: none;
      color: #111;
    }

    .linkedin-icon {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
    }

    .side-dots {
      position: absolute;
      left: 120px;
      top: 345px;
      display: flex;
      flex-direction: column;
      gap: 56px;
    }

    .side-dots span {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #b8b8b8;
      display: block;
    }

    .hero {
      position: absolute;
      left: 268px;
      top: 360px;
      display: flex;
      gap: 110px;
      align-items: flex-start;
    }

    .hero-left h1 {
      font-size: 78px;
      line-height: 1.02;
      font-weight: 400;
      letter-spacing: -1.8px;
      margin-bottom: 26px;
    }

    .hero-left p {
      font-size: 28px;
      line-height: 1.2;
      font-weight: 400;
    }

    .about {
      max-width: 295px;
      margin-top: 6px;
    }

    .about h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 26px;
    }

    .about p {
      font-size: 24px;
      line-height: 1.18;
      font-weight: 400;
    }

    .scroll-indicator {
      position: absolute;
      left: 50%;
      bottom: 74px;
      transform: translateX(-50%);
      width: 90px;
      height: 40px;
    }

    .scroll-indicator::before,
    .scroll-indicator::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 54px;
      height: 54px;
      border-right: 5px solid #d0d0d0;
      border-bottom: 5px solid #d0d0d0;
      transform: translateX(-50%) rotate(45deg);
    }

    .scroll-indicator::before {
      top: -8px;
      opacity: 0.9;
    }

    .scroll-indicator::after {
      top: 6px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <section class="desktop-frame">
    <!-- Logo -->
    <img src="portfolio_logo.png" alt="Portfolio logo" class="logo" />

    <!-- Navigation -->
    <nav class="nav">
      <a href="#">Home</a>
      <a href="#">Projects</a>
      <a href="#">Contact me</a>
      <a href="#" aria-label="LinkedIn">
        <img src="linkedin.png" alt="LinkedIn" class="linkedin-icon" />
      </a>
    </nav>

    <!-- Side dots -->
    <div class="side-dots" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- Main hero content -->
    <div class="hero">
      <div class="hero-left">
        <h1>Nathan<br />Syvash</h1>
        <p>Mechanical Engineer</p>
      </div>

      <div class="about">
        <h2>About me</h2>
        <p>
          I’m a recent Bachelor of Engineering graduate from Dartmouth College.
          My main focus is designing and deploying mechatronic systems and IoT networks.
        </p>
      </div>
    </div>

    <!-- Bottom chevron -->
    <div class="scroll-indicator" aria-hidden="true"></div>
  </section>
</body>
</html>
